<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            /* Image de fond */
            background: url("https://images.unsplash.com/photo-1498050108023-c5249f4df085") no-repeat center center/cover;
        }

        /* Overlay sombre */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        a {
            display: inline-block;
            text-decoration: none;
            background: #4facfe;
            color: white;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.3s;
        }

        a:hover {
            background: #0077ff;
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Bienvenue au Club Web</h1>
        <a href="Cours/index.html">Voir les cours</a>
    </div>
</body>

</html>
